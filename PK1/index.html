<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>To-Do List</title>
    <link rel="stylesheet" href="_css/index.css">
</head>
<body>

<div class="app">
    <div class="card">
        <h1>Список задач =]</h1>

        <div class="input-group">
            <input type="text" id="taskInput" placeholder="Добавь задачу...">

            <select id="prioritySelect">
                <option value="low">Низкий</option>
                <option value="medium" selected>Средний</option>
                <option value="high">Высокий</option>
            </select>

            <button id="addBtn">+</button>
        </div>

        <div class="controls">
            <div>
                <span>Фильтр:</span>
                <select id="filter">
                    <option value="all">Все</option>
                    <option value="active">Активные</option>
                    <option value="completed">Выполненные</option>
                </select>
            </div>

            <div>
                <span>Сортировка:</span>
                    <select id="sort">
                        <option value="none" selected>Без сортировки</option>
                        <option value="new">Сначала новые</option>
                        <option value="old">Сначала старые</option>
                        <option value="az">По алфавиту</option>
                    </select>
            </div>
        </div>

        <ul id="taskList"></ul>

        <div class="footer">
            <span id="taskCount">0 осталось</span>
            <button id="clearCompleted">Очистить выполненные</button>
        </div>
    </div>
</div>

<script src="_js/index.js"></script>
</body>
</html>
